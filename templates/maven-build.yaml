parameters:
  - name: branch
    displayName: Git branch
    type: string 
    default: 'main'
  - name: agentvmImage
    displayName: 'Agent VM Image'
    type: string
    default: 'ubuntu-latest'
  - name: jdkVersion
    displayName: 'Java Version'
    type: string
    default: '1.11'

steps:
  - task:Maven@3
    inputs:
      mavenPOMFile: 'pom.xml'
      goals: 'package'
      publishJUnitResults: yes
      testResultsFiles: '**/surefire-reports/TEST-*.xml'
      jdkVesrionOption: "${{ parameters.jdkVersion }}"
